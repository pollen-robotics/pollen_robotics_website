<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <rect width="24" height="24" rx="5" fill="#11140d"/>
  <!-- ripple rings at the contact point -->
  <circle cx="12" cy="8.5" r="5.5" fill="none" stroke="#c8f542" stroke-width="1" opacity="0.35"/>
  <circle cx="12" cy="8.5" r="3.2" fill="none" stroke="#c8f542" stroke-width="1" opacity="0.7"/>
  <!-- two antennas meeting -->
  <path d="M4.5 21 Q7 13 11.2 9.3" fill="none" stroke="#f2f4ec" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M19.5 21 Q17 13 12.8 9.3" fill="none" stroke="#f2f4ec" stroke-width="1.8" stroke-linecap="round"/>
  <!-- contact spark -->
  <circle cx="12" cy="8.5" r="1.6" fill="#c8f542"/>
</svg>
