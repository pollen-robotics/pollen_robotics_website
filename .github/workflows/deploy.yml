name: Deploy to production (GitHub Pages)

# Production (pollen-robotics.com) is NOT deployed on every push to main.
# It ships only when the dedicated `production` branch is updated, e.g.:
#   git push origin main:production
# `workflow_dispatch` is kept as a manual escape hatch (Actions > Run workflow).
on:
  push:
    branches: [production]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; newer pushes supersede in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        env:
          STATIC_EXPORT: "1"
          NEXT_PUBLIC_SITE_URL: https://pollen-robotics.com
          # Reachy Mini blog is staging-only for now; hide it in production.
          NEXT_PUBLIC_DISABLE_REACHY_BLOG: "1"
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
